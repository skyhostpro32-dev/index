<!DOCTYPE html>
<html>
<head>
  <title>Click-to-Mask & Erase Tool</title>
  <style>
    canvas { border: 1px solid black; cursor: crosshair; margin: 10px; }
    #download { display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Click Spot → Mask → Erase</h2>
  <input type="file" id="upload" accept="image/*"><br>
  <button id="eraseBtn">Apply Transparency</button>
  <a id="download" download="edited.png">Download Edited Image</a><br>

  <!-- Three canvases for the 3 stages -->
  <canvas id="original"></canvas>
  <canvas id="mask"></canvas>
  <canvas id="edited"></canvas>

  <script>
    const upload = document.getElementById("upload");
    const original = document.getElementById("original");
    const mask = document.getElementById("mask");
    const edited = document.getElementById("edited");
    const ctxO = original.getContext("2d");
    const ctxM = mask.getContext("2d");
    const ctxE = edited.getContext("2d");
    let img = new Image();
    let maskSpots = []; // store clicked spots

    // Upload image
    upload.onchange = e => {
      const file = e.target.files[0];
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        [original, mask, edited].forEach(c => {
          c.width = img.width;
          c.height = img.height;
        });
        ctxO.drawImage(img, 0, 0); // original
        ctxM.drawImage(img, 0, 0); // mask stage
        ctxE.drawImage(img, 0, 0); // edited stage
      };
    };

    // Click to add mask spot
    mask.onclick = e => {
      const rect = mask.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      maskSpots.push({x, y});

      // redraw mask canvas
      ctxM.drawImage(img, 0, 0);
      ctxM.fillStyle = "rgba(255,0,0,0.5)";
      maskSpots.forEach(s => {
        ctxM.beginPath();
        ctxM.arc(s.x, s.y, 30, 0, Math.PI * 2);
        ctxM.fill();
      });
    };

    // Apply transparency to masked spots
    document.getElementById("eraseBtn").onclick = () => {
      ctxE.drawImage(img, 0, 0);
      ctxE.globalCompositeOperation = "destination-out";
      maskSpots.forEach(s => {
        ctxE.beginPath();
        ctxE.arc(s.x, s.y, 30, 0, Math.PI * 2);
        ctxE.fill();
      });
      ctxE.globalCompositeOperation = "source-over";

      // Show download link
      const download = document.getElementById("download");
      download.href = edited.toDataURL("image/png");
      download.style.display = "inline";
    };
  </script>
</body>
</html>
